services:
  - type: web
    name: medishop-api
    runtime: python
    rootDir: apps/api
    plan: free
    buildCommand: pip install --upgrade pip && pip install -e ".[dev]"
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: LLM_PROVIDER
        value: mock
      - key: API_CORS_ORIGINS
        sync: false
