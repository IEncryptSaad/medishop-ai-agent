name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Frontend API client tests
        run: pnpm --filter @medishop/web test
      - name: Frontend lint
        run: pnpm --filter @medishop/web lint
      - name: Frontend build
        run: pnpm --filter @medishop/web build

  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "apps/api[dev]"
      - name: Backend lint
        run: ruff check apps/api/app apps/api/tests
      - name: Backend tests and smoke checks
        run: cd apps/api && pytest -q
